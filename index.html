<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #2196f3; --blue-light: #e8f4fd; --blue-mid: #bbdefb;
    --gold: #f59e0b; --bg: #f0f4f8; --surface: #ffffff;
    --border: #e2e8f0; --text: #1e293b; --muted: #64748b;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; gap: 24px; height: 52px; font-size: 13px; color: var(--muted); overflow-x: auto; }
  nav span { white-space: nowrap; cursor: pointer; padding: 4px 0; }
  nav span:hover { color: var(--blue); }
  nav .sep { color: var(--border); }

  .container { max-width: 900px; margin: 0 auto; padding: 36px 20px 60px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .filters { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 32px; }
  .select-wrap { position: relative; display: inline-flex; align-items: center; }
  .select-wrap select { appearance: none; border: 1px solid #c8d0d8; border-radius: 0; padding: 7px 32px 7px 12px; font-size: 13px; font-family: inherit; color: var(--text); background: #e4e6e9; cursor: pointer; outline: none; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
  .select-wrap::after { content: '▾'; position: absolute; right: 10px; font-size: 11px; color: var(--muted); pointer-events: none; }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--muted); }
  .search-wrap input { width: 100%; border: 1px solid #c8d0d8; border-radius: 0; padding: 7px 14px 7px 36px; font-size: 13px; font-family: inherit; outline: none; background: #e4e6e9; }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; color: var(--muted); cursor: pointer; line-height: 1; padding: 0 4px; }
  .search-clear:hover { color: var(--text); }

  /* PODIUM */
  .podium-section { margin-bottom: 32px; }
  .podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; }
  .podium-col { display: flex; flex-direction: column; align-items: center; width: 200px; }
  .podium-col.rank-1 { width: 220px; order: 2; }
  .podium-col.rank-2 { order: 1; }
  .podium-col.rank-3 { order: 3; }
  .podium-info { display: flex; flex-direction: column; align-items: center; padding-bottom: 12px; }
  .avatar-wrap { position: relative; display: inline-block; margin-bottom: 8px; }
  .avatar-placeholder { width: 68px; height: 68px; border-radius: 50%; background: linear-gradient(135deg, #90caf9 0%, #42a5f5 100%); display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; border: 3px solid #b0c4d8; }
  .rank-1 .avatar-placeholder { width: 78px; height: 78px; font-size: 26px; border: 3px solid var(--gold); box-shadow: 0 0 0 3px #fde68a; }
  .rank-badge-photo { position: absolute; bottom: 2px; right: 2px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: #fff; border: 2px solid #fff; }
  .rank-1 .rank-badge-photo { background: var(--gold); width: 28px; height: 28px; font-size: 14px; bottom: 0; right: 0; }
  .rank-2 .rank-badge-photo { background: #78909c; }
  .rank-3 .rank-badge-photo { background: #8d6748; }
  .podium-name { font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 1px; }
  .podium-title { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 4px; }
  .podium-score { display: flex; align-items: center; gap: 4px; font-size: 15px; font-weight: 700; color: var(--blue); background: var(--surface); border: 1.5px solid var(--blue-mid); border-radius: 20px; padding: 3px 12px; }
  .podium-step { width: 100%; border-radius: 10px 10px 0 0; display: flex; align-items: center; justify-content: center; }
  .podium-step-num { font-size: 52px; font-weight: 800; opacity: .25; line-height: 1; padding: 16px 0; }
  .rank-1 .podium-step { background: linear-gradient(160deg, #fef3c7 0%, #fde68a 100%); height: 120px; }
  .rank-1 .podium-step-num { color: #92400e; }
  .rank-2 .podium-step { background: linear-gradient(160deg, #f1f5f9 0%, #cbd5e1 100%); height: 88px; }
  .rank-2 .podium-step-num { color: #475569; }
  .rank-3 .podium-step { background: linear-gradient(160deg, #f1f5f9 0%, #cbd5e1 100%); height: 72px; }
  .rank-3 .podium-step-num { color: #475569; }

  /* CARDS */
  .participant-card { background: var(--surface); border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1px solid var(--border); }
  .participant-card.expanded { border-color: var(--blue); }
  .card-main { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
  .card-left { display: flex; align-items: center; gap: 12px; }
  .card-right { display: flex; align-items: center; gap: 16px; }
  .card-rank { font-size: 20px; font-weight: 700; color: #b0bac5; min-width: 32px; text-align: center; flex-shrink: 0; }
  .mini-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--blue) 0%, #42a5f5 100%); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .participant-name { font-weight: 600; font-size: 14px; }
  .participant-title { font-size: 12px; color: var(--muted); }
  .card-icons { display: flex; align-items: center; gap: 16px; }
  .card-icon-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--blue); font-size: 12px; font-weight: 600; min-width: 28px; }
  .card-divider { width: 1px; height: 36px; background: var(--border); }
  .card-total { display: flex; flex-direction: column; align-items: flex-start; min-width: 80px; }
  .card-total-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; }
  .card-total-score { display: flex; align-items: center; gap: 5px; font-size: 22px; font-weight: 700; color: var(--blue); }
  .expand-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: background .15s; outline: none; }
  .expand-btn:hover { background: var(--blue-light); color: var(--blue); }

  /* ACTIVITY */
  .recent-activity-wrap { border-top: 1px solid var(--border); background: var(--surface); }
  .recent-activity-header { padding: 10px 24px 6px; font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .activity-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .activity-table thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
  .activity-table thead th { padding: 10px 24px; text-align: left; font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .activity-table thead th:nth-child(1) { width: auto; }
  .activity-table thead th:nth-child(2) { width: 160px; }
  .activity-table thead th:nth-child(3) { width: 130px; }
  .activity-table thead th:nth-child(4) { width: 80px; text-align: right; }
  .activity-row { border-bottom: 1px solid var(--border); }
  .activity-row:last-child { border-bottom: none; }
  .activity-table td { padding: 14px 24px; vertical-align: middle; }
  .act-name { color: var(--text); font-size: 13px; }
  .act-cat-pill { background: #e9ecef; color: #495057; border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 400; white-space: nowrap; border: 1px solid #dee2e6; }
  .act-date { color: var(--muted); font-size: 13px; white-space: nowrap; text-align: left; }
  .act-points { text-align: right; font-weight: 700; font-size: 13px; color: var(--blue); white-space: nowrap; }
  .no-results { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
</style>
</head>

let expandedId = null;

function ini(name) { return name.split(" ").map(p => p[0]).join("").toUpperCase(); }

function starSVG(s) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="${s}" height="${s}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`; }
function monitorSVG(s) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="${s}" height="${s}"><rect x="2" y="3" width="20" height="13" rx="1"/><line x1="5" y1="8" x2="19" y2="8"/><line x1="12" y1="16" x2="12" y2="19"/><line x1="7" y1="21" x2="17" y2="21"/></svg>`; }
function eduSVG(s) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="${s}" height="${s}"><polygon points="12 2 22 8 12 14 2 8 12 2"/><path d="M6 11v5c0 0 2 3 6 3s6-3 6-3v-5"/><line x1="22" y1="8" x2="22" y2="14"/></svg>`; }
function smileySVG(s) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="${s}" height="${s}"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/></svg>`; }
function chevSVG(open) { return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="${open?'M18 15l-6-6-6 6':'M6 9l6 6 6-6'}"/></svg>`; }

function getFilteredBase(includeSearch) {
  const year = document.getElementById("filterYear").value;
  const qtr  = document.getElementById("filterQuarter").value;
  const cat  = document.getElementById("filterCategory").value;
  const q    = document.getElementById("searchInput").value.trim().toLowerCase();
  return EMPLOYEES.filter(e => {
    if (year !== "all" && String(e.year) !== year) return false;
    if (qtr  !== "all" && e.quarter !== qtr) return false;
    if (cat  !== "all") {
      const acts = ACTIVITIES[e.id] || [];
      const hascat = acts.some(a => a.category === cat);
      if (!hascat) return false;
    }
    if (includeSearch && q && !e.name.toLowerCase().includes(q) && !e.dept.toLowerCase().includes(q)) return false;
    return true;
  }).map(e => {
    const acts = ACTIVITIES[e.id] || [];
    const filtered = cat === "all" ? acts : acts.filter(a => a.category === cat);
    const effectiveScore = cat === "all" ? e.score : filtered.reduce((s,a) => s + a.points, 0);
    return { ...e, effectiveScore };
  }).sort((a,b) => b.effectiveScore - a.effectiveScore);
}

function getFiltered() {
  return getFilteredBase(true);
}

function renderPodium(data) {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const podium = document.getElementById("podium");
  const section = document.getElementById("podiumSection");
  podium.innerHTML = "";

  // Get full list without search to determine real top3
  const fullList = getFilteredBase(false);
  const top3 = fullList.slice(0, 3);

  if (!top3.length) { section.style.display="none"; return; }

  // If search active - only show the found employee's podium place
  if (q) {
    const foundIdx = top3.findIndex(e =>
      e.name.toLowerCase().includes(q) || e.dept.toLowerCase().includes(q)
    );
    if (foundIdx === -1) { section.style.display="none"; return; }

    // Show only that one step
    section.style.display = "";
    const e = top3[foundIdx];
    const rank = foundIdx + 1;
    const col = document.createElement("div");
    col.className = `podium-col rank-${rank}`;
    col.innerHTML = `
      <div class="podium-info">
        <div class="avatar-wrap">
          <div class="avatar-placeholder">${ini(e.name)}</div>
          <span class="rank-badge-photo">${rank}</span>
        </div>
        <div class="podium-name">${e.name}</div>
        <div class="podium-title">${e.title} (${e.grade})</div>
        <div class="podium-score">${starSVG(13)} ${e.effectiveScore}</div>
      </div>
      <div class="podium-step"><span class="podium-step-num">${rank}</span></div>`;
    podium.appendChild(col);
    return;
  }

  section.style.display = "";
  top3.forEach((e,i) => {
    const rank = i+1;
    const col = document.createElement("div");
    col.className = `podium-col rank-${rank}`;
    col.innerHTML = `
      <div class="podium-info">
        <div class="avatar-wrap">
          <div class="avatar-placeholder">${ini(e.name)}</div>
          <span class="rank-badge-photo">${rank}</span>
        </div>
        <div class="podium-name">${e.name}</div>
        <div class="podium-title">${e.title} (${e.grade})</div>
        <div class="podium-score">${starSVG(13)} ${e.effectiveScore}</div>
      </div>
      <div class="podium-step"><span class="podium-step-num">${rank}</span></div>`;
    podium.appendChild(col);
  });
}

function renderCards(data) {
  const list = document.getElementById("cardsList");
  const noRes = document.getElementById("noResults");
  list.innerHTML = "";
  if (!data.length) { noRes.style.display=""; return; }
  noRes.style.display = "none";

  const selectedCat = document.getElementById("filterCategory").value;

  // Full list without search filter to get correct ranks
  const fullList = getFilteredBase(false);

  data.forEach((e, idx) => {
    // Find real rank in full filtered list (without search)
    const realRank = fullList.findIndex(x => x.id === e.id) + 1;
    const isExp = expandedId === e.id;

    // Filter activities by selected category
    const allActs = ACTIVITIES[e.id] || [];
    const filteredActs = selectedCat === "all" ? allActs : allActs.filter(a => a.category === selectedCat);

    // Recalculate icons based on filtered activities
    const monitorCount = filteredActs.filter(a => a.category === "Public Speaking").length;
    const eduCount     = filteredActs.filter(a => a.category === "Education").length;
    const socialCount  = filteredActs.filter(a => a.category === "University Partners").length;
    const filteredScore = filteredActs.reduce((s, a) => s + a.points, 0);

    const icons = [];
    if (eduCount > 0)     icons.push(`<div class="card-icon-item">${eduSVG(22)}<span>${eduCount}</span></div>`);
    if (monitorCount > 0) icons.push(`<div class="card-icon-item">${monitorSVG(22)}<span>${monitorCount}</span></div>`);
    if (socialCount > 0)  icons.push(`<div class="card-icon-item">${smileySVG(22)}<span>${socialCount}</span></div>`);

    const acts = filteredActs.map(a=>`
      <tr class="activity-row">
        <td class="act-name">${a.name}</td>
        <td><span class="act-cat-pill">${a.category}</span></td>
        <td class="act-date">${a.date}</td>
        <td class="act-points">+${a.points}</td>
      </tr>`).join("");

    const displayScore = selectedCat === "all" ? e.score : filteredScore;

    const card = document.createElement("div");
    card.className = "participant-card" + (isExp ? " expanded" : "");
    card.innerHTML = `
      <div class="card-main">
        <div class="card-left">
          <span class="card-rank">${realRank}</span>
          <div class="mini-avatar">${ini(e.name)}</div>
          <div>
            <div class="participant-name">${e.name}</div>
            <div class="participant-title">${e.title} (${e.grade})</div>
          </div>
        </div>
        <div class="card-right">
          <div class="card-icons">${icons.join("")}</div>
          <div class="card-divider"></div>
          <div class="card-total">
            <span class="card-total-label">TOTAL</span>
            <span class="card-total-score">${starSVG(20)} ${displayScore}</span>
          </div>
          <button class="expand-btn" data-id="${e.id}">${chevSVG(isExp)}</button>
        </div>
      </div>
      ${isExp ? `<div class="recent-activity-wrap">
        <div class="recent-activity-header">RECENT ACTIVITY</div>
        <table class="activity-table">
          <thead><tr><th>ACTIVITY</th><th>CATEGORY</th><th>DATE</th><th>POINTS</th></tr></thead>
          <tbody>${acts||'<tr><td colspan="4" style="text-align:center;color:#64748b;padding:20px">No activity recorded</td></tr>'}</tbody>
        </table>
      </div>` : ""}`;
    list.appendChild(card);
  });

  list.querySelectorAll(".expand-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = parseInt(btn.dataset.id);
      expandedId = expandedId === id ? null : id;
      render();
    });
  });
}

function render() {
  const data = getFiltered();
  renderPodium(data);
  renderCards(data);
}

["filterYear","filterQuarter","filterCategory"].forEach(id =>
  document.getElementById(id).addEventListener("change", render)
);


const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", function() {
  searchClear.style.display = this.value ? "" : "none";
  render();
});

searchClear.addEventListener("click", function() {
  searchInput.value = "";
  searchClear.style.display = "none";
  render();
});

render();
